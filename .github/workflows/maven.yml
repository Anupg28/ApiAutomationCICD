name: Selenium CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Notify Start - Google Chat
      run: |
        curl -H 'Content-Type: application/json' \
        -d "{\"text\": \"🚀 Test Execution Started\n🔹 Repo: ${{ github.repository }}\n👤 Triggered by: ${{ github.actor }}\n🔁 Run ID: #${{ github.run_number }}\"}" \
        "${{ secrets.GOOGLE_CHAT_WEBHOOK }}"

    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build with Maven and run tests
      continue-on-error: true
      run: mvn clean test -DsuiteXmlFile=testng.xml

    # -------------------------------
    #       EXTRACT TEST RESULTS
    # -------------------------------
    - name: Extract TestNG results
      if: always()
      id: testresults
      run: |
        RESULTS_FILE="target/surefire-reports/testng-results.xml"

        if [ ! -f "$RESULTS_FILE" ]; then
          echo "passed=0" >> $GITHUB_OUTPUT
          echo "failed=0" >> $GITHUB_OUTPUT
          echo "skipped=0" >> $GITHUB_OUTPUT
          echo "total=0" >> $GITHUB_OUTPUT
          exit 0
        fi

        PASSED=$(xmllint --xpath "string(/testng-results/@passed)" $RESULTS_FILE)
        FAILED=$(xmllint --xpath "string(/testng-results/@failed)" $RESULTS_FILE)
        SKIPPED=$(xmllint --xpath "string(/testng-results/@skipped)" $RESULTS_FILE)
        TOTAL=$(xmllint --xpath "string(/testng-results/@total)" $RESULTS_FILE)

        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failed=$FAILED" >> $GITHUB_OUTPUT
        echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
        echo "total=$TOTAL" >> $GITHUB_OUTPUT

    # -------------------------------
    #       SAVE TEST REPORT
    # -------------------------------
    - name: Archive Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-report
        path: target/surefire-reports/

    - name: Create timestamped report directory
      if: always()
      id: timestamp
      run: |
        export TS="run-$(date +%Y-%m-%d_%H-%M-%S)"
        mkdir -p gh-pages/$TS
        cp -r target/surefire-reports/* gh-pages/$TS/
        echo "report_path=$TS" >> $GITHUB_OUTPUT

    - name: Deploy timestamped report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        personal_token: ${{ secrets.REPORT_REPO_PAT }}
        external_repository: Anupg28/api-test-reports
        publish_branch: gh-pages
        publish_dir: gh-pages
        keep_files: true

    # -------------------------------
    #     GOOGLE CHAT COMPLETION
    # -------------------------------
    - name: Notify Completion - Google Chat
      if: always()
      run: |
        STATUS="${{ job.status }}"
        REPORT_PATH="${{ steps.timestamp.outputs.report_path }}"
        REPORT_URL="https://Anupg28.github.io/api-test-reports/${REPORT_PATH}/emailable-report.html"

        PASSED="${{ steps.testresults.outputs.passed }}"
        FAILED="${{ steps.testresults.outputs.failed }}"
        SKIPPED="${{ steps.testresults.outputs.skipped }}"
        TOTAL="${{ steps.testresults.outputs.total }}"

        curl -H 'Content-Type: application/json' \
        -d "{
              \"text\": \"✅ Test Execution Completed
📊 *Test Summary*
✔️ Passed: $PASSED
❌ Failed: $FAILED
⚠️ Skipped: $SKIPPED
📦 Total: $TOTAL

📄 Status: $STATUS
🔗 [View Report]($REPORT_URL)
👤 Author: ${{ github.actor }}
🔁 Run ID: #${{ github.run_number }}\"
            }" \
        "${{ secrets.GOOGLE_CHAT_WEBHOOK }}"

    # -------------------------------
    #      EMAIL REPORT SECTION
    # -------------------------------
    - name: Send Email Report
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "Test Execution Report - Run #${{ github.run_number }}"
        to: "ghodake.anup@thinkitive.com"
        from: "anupghodake28@gmail.com"
        attachments: "target/surefire-reports/emailable-report.html"
        body: |
          Hello Team,

          Test Execution has been completed for Run #${{ github.run_number }}.

          📊 Test Summary:
          ✔️ Passed: ${{ steps.testresults.outputs.passed }}
          ❌ Failed: ${{ steps.testresults.outputs.failed }}
          ⚠️ Skipped: ${{ steps.testresults.outputs.skipped }}
          📦 Total: ${{ steps.testresults.outputs.total }}

          The TestNG HTML Report is attached.

          Regards,
          Anup G
