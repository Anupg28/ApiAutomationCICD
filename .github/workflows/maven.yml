name: Selenium CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Notify Start - Google Chat
      run: |
        curl -H 'Content-Type: application/json' \
        -d "{\"text\": \"🚀 *Test Execution Started*\n🔹 Repo: ${{ github.repository }}\n👤 Triggered by: ${{ github.actor }}\n🔁 Run ID: #${{ github.run_number }}\"}" \
        "${{ secrets.GOOGLE_CHAT_WEBHOOK }}"

    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build with Maven and run tests
      run: mvn clean test -DsuiteXmlFile=testng.xml

    - name: Archive Test Report
      uses: actions/upload-artifact@v4
      with:
        name: surefire-report
        path: target/surefire-reports/

    # - name: Create timestamped report directory
    #   id: timestamp
    #   run: |
    #     export TS="run-$(date +%Y-%m-%d_%H-%M-%S)"
    #     mkdir -p gh-pages/$TS
    #     cp -r target/surefire-reports/* gh-pages/$TS/
    #     echo "report_path=$TS" >> $GITHUB_OUTPUT

    # - name: Deploy timestamped report to GitHub Pages
    #   if: always()
    #   uses: peaceiris/actions-gh-pages@v3
    #   with:
    #     personal_token: ${{ secrets.REPORT_REPO_PAT }}
    #     external_repository: agammishra12/selenium-reports-public
    #     publish_branch: gh-pages
    #     publish_dir: gh-pages
    #     keep_files: true

    - name: Notify Completion - Google Chat
      if: always()
      run: |
        STATUS="${{ job.status }}"
        REPORT_PATH="${{ steps.timestamp.outputs.report_path }}"
        REPORT_URL="https://agammishra12.github.io/selenium-reports-public/${REPORT_PATH}/emailable-report.html"

        curl -H 'Content-Type: application/json' \
        -d "{\"text\": \"✅ *Test Execution Completed*\n📄 Status: $STATUS\n📎 [View Report]($REPORT_URL)\n👤 Author: ${{ github.actor }}\n🔁 Run ID: #${{ github.run_number }}\"}" \
        "${{ secrets.GOOGLE_CHAT_WEBHOOK }}"
